spring:
  application:
    name: wellness-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/wellness_mate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:wellness}
    password: ${SPRING_DATASOURCE_PASSWORD:wellness-dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

security:
  jwt:
    secret: ${JWT_SECRET:local-only-secret-change-before-demo}
    ttl: ${JWT_TTL:PT2H}

ai:
  base-url: ${LLM_API_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:gpt-5.5}
  food-base-url: ${FOOD_LLM_API_BASE_URL:${LLM_API_BASE_URL:https://api.openai.com/v1}}
  food-api-key: ${FOOD_LLM_API_KEY:${LLM_API_KEY:}}
  food-model: ${FOOD_LLM_MODEL:${LLM_MODEL:gpt-5.5}}
