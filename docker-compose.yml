services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wellness_mate}
      MYSQL_USER: ${MYSQL_USER:-wellness}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wellness-dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-dev-change-me}
    ports:
      - "3307:3306"
    volumes:
      - wellness-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-wellness_mate}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-wellness}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-wellness-dev}
      JWT_SECRET: ${JWT_SECRET:-local-only-secret-change-before-demo}
      JWT_TTL: ${JWT_TTL:-PT2H}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  wellness-mysql-data:
